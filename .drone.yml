kind: pipeline
type: docker
name: validate

trigger:
  event:
    - push
    - pull_request
    - tag

volumes:
  - name: go-mod-cache
    temp: {}
  - name: go-build-cache
    temp: {}

steps:
  - name: module-tests
    image: golang:1.25-bookworm
    environment:
      CGO_ENABLED: "1"
    commands:
      - |
        bash -euo pipefail <<'BASH'
        for module in \
          module/core \
          module/auth \
          module/contacts \
          module/orders \
          module/assets \
          module/products \
          module/falabella \
          module/syncrecord \
          module/membership \
          module/analytics \
          module/email \
          module/shipping
        do
          echo "Running tests for $module"
          (cd "$module" && go test ./...)
        done
        BASH
    volumes:
      - name: go-mod-cache
        path: /go/pkg/mod
      - name: go-build-cache
        path: /root/.cache/go-build

  - name: e2e-tests
    image: golang:1.25-bookworm
    depends_on:
      - module-tests
    environment:
      CGO_ENABLED: "1"
    commands:
      - |
        bash -euo pipefail <<'BASH'
        first_log="root-e2e-attempt-1.log"
        retry_log="root-e2e-attempt-2.log"

        echo "Running root E2E suite (attempt 1)..."
        if go test ./e2e -v -count=1 2>&1 | tee "$first_log"; then
          exit 0
        fi

        echo "Root E2E suite failed on attempt 1. Retrying once..."
        if go test ./e2e -v -count=1 2>&1 | tee "$retry_log"; then
          echo "Root E2E suite passed on retry (attempt 2)."
          exit 0
        fi

        echo "Root E2E suite failed after retry. Failing tests from logs:"
        grep -E '^--- FAIL: ' "$first_log" "$retry_log" || true
        exit 1
        BASH
    volumes:
      - name: go-mod-cache
        path: /go/pkg/mod
      - name: go-build-cache
        path: /root/.cache/go-build

  - name: performance-tests
    image: golang:1.25-bookworm
    depends_on:
      - module-tests
    environment:
      CGO_ENABLED: "1"
    commands:
      - cd module/core
      - go test ./search -run '^$' -bench BenchmarkSpotlightFanout -benchmem -benchtime=100x -count=1
    volumes:
      - name: go-mod-cache
        path: /go/pkg/mod
      - name: go-build-cache
        path: /root/.cache/go-build

---
kind: pipeline
type: docker
name: docker-publish

depends_on:
  - validate

trigger:
  event:
    - push
    - tag

steps:
  - name: publish-main
    image: plugins/docker
    settings:
      registry: docker.momlesstomato.dev
      repo: docker.momlesstomato.dev/fl-docker/mannaiah-go
      dockerfile: Dockerfile
      username:
        from_secret: nexus_username
      password:
        from_secret: nexus_password
      tags:
        - latest
        - ${DRONE_COMMIT_SHA}
    when:
      event:
        - push
      branch:
        - main

  - name: publish-tag
    image: plugins/docker
    settings:
      registry: docker.momlesstomato.dev
      repo: docker.momlesstomato.dev/fl-docker/mannaiah-go
      dockerfile: Dockerfile
      username:
        from_secret: nexus_username
      password:
        from_secret: nexus_password
      tags:
        - ${DRONE_TAG}
        - ${DRONE_COMMIT_SHA}
    when:
      event:
        - tag
