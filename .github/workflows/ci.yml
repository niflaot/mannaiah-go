name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  module-tests:
    name: Module Tests (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - module/core
          - module/auth
          - module/contacts
          - module/assets
          - module/products
          - module/woocommerce

    defaults:
      run:
        working-directory: ${{ matrix.module }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Tests
        env:
          CGO_ENABLED: "1"
        run: go test ./...

  e2e-tests:
    name: Root E2E Tests
    runs-on: ubuntu-latest
    needs:
      - module-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Root E2E Suite
        env:
          CGO_ENABLED: "1"
        run: go test ./e2e -v -count=1

  performance-tests:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs:
      - module-tests

    defaults:
      run:
        working-directory: module/woocommerce

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Contact Sync Benchmarks
        env:
          CGO_ENABLED: "1"
        run: go test ./application/contact/service -run '^$' -bench BenchmarkProcessCommands -benchmem -benchtime=100x -count=1
